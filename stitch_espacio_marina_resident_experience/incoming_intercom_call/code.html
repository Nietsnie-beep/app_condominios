<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "tertiary": "#206380",

                    "on-primary-container": "#fefdff",
                    "tertiary-container": "#3e7c9a",

            "fontFamily": {

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1 !important;
        }
        .glass-overlay {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .ring-animation {
            animation: ring 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .pulse-border::after {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid white;
            border-radius: inherit;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        body {
            overflow: hidden;
            background-color: #000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface">
<!-- Full Screen Camera Preview -->
<div class="fixed inset-0 z-0">
<div class="w-full h-full relative">
<div class="w-full h-full bg-cover bg-center transition-transform duration-1000 scale-105" data-alt="A high-definition wide-angle security camera view of a modern luxury residential entrance gate. A delivery person wearing a uniform stands near a sleek intercom pillar under soft, golden hour coastal lighting. In the background, white architectural pillars and lush tropical greenery frame the scene. The image is crisp, professional, and evokes a high-tier concierge atmosphere with a clean, light-mode palette." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBvAdqHtFLFVL5DXMyjkxvBkF8sERpjMGTxaeEaZXnbtpe_BWkAVN7kdzPp7TnmvvNO3cJw1hszGJyLQGQhXQOeD3KDWUmN3us6XlJqsj64_D3FOy7zA0E2svr8oTOyyBXbUVknHmt5ocvyoSn13NTonKP-wupvSeZjR1-hkQiqWjlKznGhBl_Ip63fhCuaHn0BrkG5QTOd2Vc8OMIE4dtICPaexCtWaP1NxlwZQGsjXLu_TAVFGzPzcIgwvw_EQBJjUz3D8LNh_Y4c')"></div>
<!-- Dark Overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/40"></div>
</div>
</div>
<!-- UI Overlay Layer -->
<main class="relative z-10 flex flex-col h-screen justify-between py-12 px-container-padding-mobile md:px-container-padding-desktop">
<!-- Top Status Area -->
<header class="flex flex-col items-center text-center space-y-2 animate-fadeIn">
<div class="glass-overlay rounded-full px-4 py-1 flex items-center space-x-2 mb-4">
<span class="w-2 h-2 rounded-full bg-error ring-4 ring-error/20 animate-pulse"></span>
<span class="font-label-caps text-label-caps text-on-surface-variant">Incoming Intercom Call</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile md:text-display-lg text-white font-extrabold tracking-tight">
                Delivery - UberEats
            </h1>
<p class="font-body-lg text-white/80 flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-white/60">location_on</span>
<span>Main Entrance Gate</span>
</p>
</header>
<!-- Dynamic Visualizer / Center Element -->
<div class="flex-grow flex items-center justify-center">
<!-- Placeholder for potential threejs or shader, using simple CSS for now -->
<div class="relative w-24 h-24 flex items-center justify-center ring-animation">
<div class="absolute inset-0 rounded-full border border-white/30 animate-ping"></div>
<div class="w-20 h-20 rounded-full glass-overlay flex items-center justify-center">
<span class="material-symbols-outlined text-white text-4xl fill-icon" style="font-variation-settings: 'FILL' 1">notifications_active</span>
</div>
</div>
</div>
<!-- Action Controls -->
<section class="w-full max-w-2xl mx-auto space-y-8 pb-8">
<!-- Quick Action: Open Gate -->
<div class="flex justify-center">
<button class="group flex flex-col items-center space-y-3 transition-transform active:scale-95">
<div class="w-20 h-20 bg-primary text-white rounded-full flex items-center justify-center shadow-2xl shadow-primary/40 group-hover:bg-primary-container transition-colors relative">
<span class="material-symbols-outlined text-3xl">meeting_room</span>
</div>
<span class="font-label-caps text-label-caps text-white tracking-widest uppercase">Open Gate</span>
</button>
</div>
<!-- Main Call Actions Grid -->
<div class="grid grid-cols-4 gap-4 items-end">
<!-- Mute -->
<div class="flex flex-col items-center space-y-3">
<button class="w-14 h-14 md:w-16 md:h-16 glass-overlay rounded-full flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-90">
<span class="material-symbols-outlined">mic_off</span>
</button>
<span class="font-label-caps text-[10px] text-white/70">MUTE</span>
</div>
<!-- Reject -->
<div class="flex flex-col items-center space-y-3">
<button class="w-16 h-16 md:w-20 md:h-20 bg-error rounded-full flex items-center justify-center text-white shadow-xl shadow-error/30 hover:brightness-110 transition-all active:scale-90">
<span class="material-symbols-outlined text-3xl fill-icon" style="font-variation-settings: 'FILL' 1">call_end</span>
</button>
<span class="font-label-caps text-label-caps text-white">REJECT</span>
</div>
<!-- Accept -->
<div class="flex flex-col items-center space-y-3">
<button class="w-16 h-16 md:w-20 md:h-20 bg-secondary rounded-full flex items-center justify-center text-white shadow-xl shadow-secondary/30 hover:brightness-110 transition-all active:scale-90 pulse-border relative">
<span class="material-symbols-outlined text-3xl fill-icon" style="font-variation-settings: 'FILL' 1">call</span>
</button>
<span class="font-label-caps text-label-caps text-white">ACCEPT</span>
</div>
<!-- More / Snapshot -->
<div class="flex flex-col items-center space-y-3">
<button class="w-14 h-14 md:w-16 md:h-16 glass-overlay rounded-full flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-90">
<span class="material-symbols-outlined">photo_camera</span>
</button>
<span class="font-label-caps text-[10px] text-white/70">SNAP</span>
</div>
</div>
</section>
</main>
<!-- UI Background Atmosphere (Subtle Shader-like movement) -->
<div class="fixed inset-0 pointer-events-none z-[1]">
<div class="absolute top-0 left-0 w-full h-1/3 bg-gradient-to-b from-black/40 to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black/80 to-transparent"></div>
</div>
<!-- Hidden Navigation Shell Logic (Suppressed as per rules for task-focused/transactional screens) -->
<script>
        // Micro-interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                // Haptic feedback simulation could go here
                console.log('Action triggered');
            });
        });

        // Simple animation trigger on load
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelector('header').classList.add('translate-y-0', 'opacity-100');
        });
    </script>
</body></html>
